<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Logo centré -->
  <g transform="translate(256, 200)">
    <!-- Cercle -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3b82f6" stroke-width="8"/>
    
    <!-- Bouclier -->
    <path d="M0 -40 L55 -15 V35 C55 65 30 85 0 100 C-30 85 -55 65 -55 35 V-15 L0 -40Z" 
          fill="#60a5fa" stroke="#ffffff" stroke-width="6"/>
    
    <!-- Checkmark -->
    <path d="M-20 10 L-5 30 L30 -10" 
          fill="none" stroke="#1e3a8a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Texte -->
  <text x="256" y="360" text-anchor="middle" fill="#ffffff" font-size="36" font-family="Arial, sans-serif" font-weight="bold">
    Secure IA
  </text>
  <text x="256" y="400" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">
    Détection de Deepfakes
  </text>
</svg>
